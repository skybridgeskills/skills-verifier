name: Main push

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag-next-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and push tag
        env:
          BRANCH: main
          CI: 'true'
        run: ./scripts/tag-next-version.sh

      - name: Get app version
        id: version
        run: echo "app_version=$(./scripts/print-app-version.sh)" >> "$GITHUB_OUTPUT"

  create-release:
    needs: [tag-next-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --prune --prune-tags origin

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ needs.tag-next-version.outputs.app_version }}
        run: |
          gh release create "v${APP_VERSION}" \
            --title "Release ${APP_VERSION}" \
            --generate-notes \
            --latest
